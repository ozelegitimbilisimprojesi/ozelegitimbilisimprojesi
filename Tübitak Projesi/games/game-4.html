<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kodla Mantık Geliştir</title>
<style>
:root {
  --bg-color: #E0F7FA;
  --cell-color: #B2EBF2;
  --player-color: #FF7043;
  --target-color: #FFEB3B;
  --obstacle-color: #8D6E63;
  --text-color: #004D40;
}

body {
  font-family: Arial;
  text-align:center;
  background: var(--bg-color);
  margin:0; padding:20px;
  color: var(--text-color);
  transition: background 0.3s, color 0.3s;
}

h1 { margin-top:20px; color:#006064; }
#level { margin-top:10px; font-size:20px; font-weight:bold; }
#grid {
  display:grid;
  grid-template-columns: repeat(5, 60px);
  grid-template-rows: repeat(5, 60px);
  gap:5px;
  justify-content:center;
  margin:auto;
  margin-top:20px;
}
.cell {
  width:60px; height:60px;
  background: var(--cell-color);
  display:flex; justify-content:center; align-items:center;
  font-size:24px; border-radius:10px; transition:0.3s;
}
.player { background: var(--player-color); }
.target { background: var(--target-color); }
.obstacle { background: var(--obstacle-color); }

button { padding:10px 15px; margin:5px; font-size:16px; border-radius:8px; cursor:pointer; }
#commands { margin-top:20px; }
#message { margin-top:15px; font-size:18px; min-height:20px; }

#theme-toggle {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 10px 15px;
  border-radius: 8px;
  cursor: pointer;
  font-weight:bold;
}
</style>
</head>
<body>

<h1>🧩 Kodla Mantığını Geliştir</h1>
<button id="theme-toggle" onclick="toggleTheme()">🌙 Tema</button>
<div id="level">Seviye: 1 / 20</div>
<div id="grid"></div>

<div id="commands">
  <button onclick="addCommand('Yukarı')">⬆️ Yukarı</button>
  <button onclick="addCommand('Aşağı')">⬇️ Aşağı</button>
  <button onclick="addCommand('Sol')">⬅️ Sol</button>
  <button onclick="addCommand('Sağ')">➡️ Sağ</button>
  <button onclick="runCommands()">🏃‍♂️ Çalıştır</button>
  <button onclick="resetLevel()">🔄 Sıfırla</button>
</div>

<div id="message"></div>

<script>
const gridEl = document.getElementById('grid');
let grid=[], playerPos={}, targetPos={}, commands=[], level=1, maxLevel=20;

// 20 seviye harita dizisi
const levels = [
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:1,y:2},{x:2,y:2}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:1,y:1},{x:2,y:2},{x:3,y:1}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:1,y:0},{x:1,y:1},{x:2,y:2}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:2,y:1},{x:2,y:2},{x:1,y:3}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:1,y:2},{x:3,y:1},{x:2,y:3}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:1,y:1},{x:2,y:2},{x:3,y:3}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:0,y:2},{x:2,y:1},{x:3,y:2}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:1,y:3},{x:2,y:2},{x:3,y:1}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:2,y:2},{x:1,y:1},{x:3,y:3}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:0,y:1},{x:2,y:3},{x:3,y:2}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:1,y:2},{x:2,y:1},{x:3,y:2}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:1,y:1},{x:2,y:3},{x:3,y:1}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:0,y:2},{x:2,y:2},{x:3,y:3}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:1,y:1},{x:2,y:2},{x:3,y:0}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:1,y:2},{x:2,y:3},{x:3,y:1}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:0,y:1},{x:2,y:2},{x:3,y:3}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:1,y:1},{x:2,y:1},{x:3,y:2}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:1,y:2},{x:2,y:2},{x:3,y:1}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:1,y:3},{x:2,y:2},{x:3,y:2}]},
  {player:{x:0,y:0}, target:{x:4,y:4}, obstacles:[{x:1,y:1},{x:2,y:3},{x:3,y:1}]}
];

// Tema değişkeni
let darkTheme=false;
function toggleTheme(){
  darkTheme=!darkTheme;
  if(darkTheme){
    document.documentElement.style.setProperty('--bg-color','#263238');
    document.documentElement.style.setProperty('--cell-color','#37474F');
    document.documentElement.style.setProperty('--player-color','#FF8A65');
    document.documentElement.style.setProperty('--target-color','#FFD54F');
    document.documentElement.style.setProperty('--obstacle-color','#A1887F');
    document.documentElement.style.setProperty('--text-color','#ECEFF1');
    document.getElementById('theme-toggle').innerText='☀️ Tema';
  } else {
    document.documentElement.style.setProperty('--bg-color','#E0F7FA');
    document.documentElement.style.setProperty('--cell-color','#B2EBF2');
    document.documentElement.style.setProperty('--player-color','#FF7043');
    document.documentElement.style.setProperty('--target-color','#FFEB3B');
    document.documentElement.style.setProperty('--obstacle-color','#8D6E63');
    document.documentElement.style.setProperty('--text-color','#004D40');
    document.getElementById('theme-toggle').innerText='🌙 Tema';
  }
}

// Grid oluştur
function initLevel(l){
  gridEl.innerHTML='';
  grid=[];
  for(let y=0;y<5;y++){
    let row=[];
    for(let x=0;x<5;x++){
      const cell=document.createElement('div');
      cell.className='cell';
      gridEl.appendChild(cell);
      row.push(cell);
    }
    grid.push(row);
  }
  const lvl = levels[l-1];
  playerPos={...lvl.player};
  targetPos={...lvl.target};
  lvl.obstacles.forEach(ob=>grid[ob.y][ob.x].classList.add('obstacle'));
  grid[playerPos.y][playerPos.x].classList.add('player');
  grid[targetPos.y][targetPos.x].classList.add('target');
  document.getElementById('level').innerText = 'Seviye: '+level+' / '+maxLevel;
  commands=[];
  document.getElementById('message').innerText='';
}
initLevel(level);

// Komut ekle
function addCommand(dir){
  commands.push(dir);
  document.getElementById('message').innerText='Komutlar: '+commands.join(', ');
}

// Komutları çalıştır
function runCommands(){
  let i=0;
  function nextMove(){
    if(i>=commands.length) return;
    const move=commands[i];
    let newX=playerPos.x;
    let newY=playerPos.y;
    if(move==='Yukarı') newY--;
    else if(move==='Aşağı') newY++;
    else if(move==='Sol') newX--;
    else if(move==='Sağ') newX++;
    // sınır ve engel kontrol
    if(newX<0 || newX>4 || newY<0 || newY>4 || grid[newY][newX].classList.contains('obstacle')){
      document.getElementById('message').innerText='❌ Engelle karşılaştın! Komutu değiştir.';
      return;
    }
    grid[playerPos.y][playerPos.x].classList.remove('player');
    playerPos={x:newX,y:newY};
    grid[playerPos.y][playerPos.x].classList.add('player');
    if(playerPos.x===targetPos.x && playerPos.y===targetPos.y){
      document.getElementById('message').innerText='🎉 Tebrikler! Seviye tamamlandı!';
      if(level<maxLevel){
        level++;
        setTimeout(()=>initLevel(level),1000);
      } else {
        document.getElementById('message').innerText='🏆 Tüm 20 seviyeyi tamamladınız! Tebrikler!';
      }
      return;
    }
    i++;
    setTimeout(nextMove,400);
  }
  nextMove();
}

// Sıfırla
function resetLevel(){ initLevel(level); }
</script>

</body>
</html>
